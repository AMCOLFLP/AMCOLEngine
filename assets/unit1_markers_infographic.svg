y="248" r="30" fill="#2774b8" opacity=".13"/><circle cx="1242" cy="248" r="18" fill="#2774b8"/><text x="1284" y="242" class="cardTitle">INFORMATION</text><text x="1220" y="300" class="body"><tspan x="1220" dy="0">Fact or status</tspan></text><text x="1220" y="448" class="small">Clear • Short • Operational</text><rect x="70" y="504" width="346" height="286" rx="26" fill="#fff" stroke="#d9e3ed" filter="url(#shadow)"/><rect x="70" y="504" width="10" height="286" rx="5" fill="#d7881f"/><circle cx="128" cy="562" r="30" fill="#d7881f" opacity=".13"/><circle cx="128" cy="562" r="18" fill="#d7881f"/><text x="170" y="556" class="cardTitle">QUESTION</text><text x="106" y="614" class="body"><tspan x="106" dy="0">Ask one exact point</tspan></text><text x="106" y="762" class="small">Clear • Short • Operational</text><rect x="442" y="504" width="346" height="286" rx="26" fill="#fff" stroke="#d9e3ed" filter="url(#shadow)"/><rect x="442" y="504" width="10" height="286" rx="5" fill="#6e5fb8"/><circle cx="500" cy="562" r="30" fill="#6e5fb8" opacity=".13"/><circle cx="500" cy="562" r="18" fill="#6e5fb8"/><text x="542" y="556" class="cardTitle">ANSWER</text><text x="477" y="614" class="body"><tspan x="477" dy="0">Direct response</tspan></text><text x="478" y="762" class="small">Clear • Short • Operational</text><rect x="813" y="504" width="346" height="286" rx="26" fill="#fff" stroke="#d9e3ed" filter="url(#shadow)"/><rect x="813" y="504" width="10" height="286" rx="5" fill="#3c8f9d"/><circle cx="871" cy="562" r="30" fill="#3c8f9d" opacity=".13"/><circle cx="871" cy="562" r="18" fill="#3c8f9d"/><text x="913" y="556" class="cardTitle">REQUEST</text><text x="849" y="614" class="body"><tspan x="849" dy="0">Assistance or permission</tspan></text><text x="849" y="762" class="small">Clear • Short • Operational</text><rect x="1184" y="504" width="346" height="286" rx="26" fill="#fff" stroke="#d9e3ed" filter="url(#shadow)"/><rect x="1184" y="504" width="10" height="286" rx="5" fill="#c43b3b"/><