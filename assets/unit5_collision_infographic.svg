<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
<title id="title">Radar-to-Speech and Encounter Awareness</title><desc id="desc">Translate radar data into exact speech while preserving COLREG responsibilities.</desc>
<defs>
  <linearGradient id="header" x1="0" x2="1"><stop offset="0" stop-color="#071a33"/><stop offset="1" stop-color="#0b3764"/></linearGradient>
  <linearGradient id="gold" x1="0" x2="1"><stop offset="0" stop-color="#d8aa3d"/><stop offset="1" stop-color="#f2c866"/></linearGradient>
