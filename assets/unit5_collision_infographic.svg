<rect x="0" y="0" width="1600" height="145" fill="url(#header)"/><rect x="0" y="137" width="1600" height="8" fill="url(#gold)"/><text x="70" y="68" class="title">Radar-to-Speech and Encounter Awareness</text><text x="72" y="108" class="subtitle">AMCOL Maritime English • Unit 5 Visual Guide</text><rect x="70" y="190" width="469" height="286" rx="26" fill="#fff" stroke="#d9e3ed" filter="url(#shadow)"/><rect x="70" y="190" width="10" height="286" rx="5" fill="#174a82"/><circle cx="128" cy="248" r="30" fill="#174a82" opacity=".13"/><circle cx="128" cy="248" r="18" fill="#174a82"/><text x="170" y="242" class="cardTitle">BEARING</text><text x="106" y="300" class="body"><tspan x="106" dy="0">Where the target is</tspan></text><text x="106" y="448" class="small">Clear • Short • Operational</text><rect x="565" y="190" width="469" height="286" rx="26" fill="#fff" stroke="#d9e3ed" filter="url(#shadow)"/><rect x="565" y="190" width="10" height="286" rx="5" fill="#d8aa3d"/><circle cx="623" cy="248" r="30" fill="#d8aa3d" opacity=".13"/><circle cx="623" cy="248" r="18" fill="#d8aa3d"/><text x="665" y="242" class="cardTitle">RANGE</text><text x="601" y="300" class="body"><tspan x="601" dy="0">Distance to target</tspan></text><text x="601" y="448" class="small">Clear • Short • Operational</text><rect x="1061" y="190" width="469" height="286" rx="26" fill="#fff" stroke="#d9e3ed" filter="url(#shadow)"/><rect x="1061" y="190" width="10" height="286" rx="5" fill="#2f8b68"/><circle cx="1119" cy="248" r="30" fill="#2f8b68" opacity=".13"/><circle cx="1119" cy="248" r="18" fill="#2f8b68"/><text x="1161" y="242" class="cardTitle">CPA</text><text x="1096" y="300" class="body"><tspan x="1096" dy="0">Closest predicted distance</tspan></text><text x="1097" y="448" class="small">Clear • Short • Operational</text><rect x="70" y="504" width="469" height="286" rx="26" fill="#fff" stroke="#d9e3ed" filter="url(#shadow)"/><rect x="70" y="504" width="10" height="286" rx="5" fill="#2774b8"/><circle cx="128" cy="562" r="30" fill="#2774b8" opacity=".13"/><circle cx="128" cy="562" r="18" fill="#2774b8"/><text x="170" y="556" class="cardTitle">TCPA</text><text x="106" y="614" class="body"><tspan x="106" dy="0">Time until CPA</tspan></text><text x="106" y="762" class="small">Clear • Short • Operational</text><rect x="565" y="504" width="469" height="286" rx="26" fill="#fff" stroke="#d9e3ed" filter="url(#shadow)"/><rect x="565" y="504" width="10" height="286" rx="5" fill="#d7881f"/><circle cx="623" cy="562" r="30" fill="#d7881f" opacity=".13"/><circle cx="623" cy="562" r="18" fill="#d7881f"/><text x="665" y="556" class="cardTitle">ENCOUNTER</text><text x="601" y="614" class="body"><tspan x="601" dy="0">Head-on / crossing / overtaking</tspan></text><text x="601" y="762" class="small">Clear • Short • Operational</text><rect x="1061" y="504" width="469" height="286" rx="26" fill="#fff" stroke="#d9e3ed" filter="url(#shadow)"/><rect x="1061" y="504" width="10" height="286" rx="5" fill="#6e5fb8"/><circle cx="1119" cy="562" r="30" fill="#6e5fb8" opacity=".13"/><circle cx="1119" cy="562" r="18" fill="#6e5fb8"/><text x="1161" y="556" class="cardTitle">INTENTION</text><text x="1096" y="614" class="body"><tspan x="1096" dy="0">Planned avoiding action</tspan></text><text x="1097" y="762" class="small">Clear • Short • Operational</text><rect x="70" y="826" width="1460" height="1" fill="#d9e3ed"/><text x="70" y="863" class="small">Use this visual before reading the detailed discussion, then return to it during practice.</text>
