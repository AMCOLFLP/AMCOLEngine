<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
<title id="title">VHF Routine Communication Flow</title><desc id="desc">Build short, predictable VHF exchanges with correct identification and endings.</desc>
<defs>
  <linearGradient id="header" x1="0" x2="1"><stop offset="0" stop-color="#071a33"/><stop offset="1" stop-color="#0b3764"/></linearGradient>
  <linearGradient id="gold" x1="0" x2="1"><stop offset="0" stop-color="#d8aa3d"/><stop offset="1" stop-color="#f2c866"/></linearGradient>
  <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#071a33" flood-opacity=".13"/></filter>
  <style>
    .title{font:700 48px Arial,sans-serif;fill:#fff} .subtitle{font:400 23px Arial,sans-serif;fill:#dbe7f3}
    .cardTitle{font:700 24px Arial,sans-serif;fill:#071a33} .body{font:400 21px Arial,sans-serif;fill:#18324d}
    .small{font:600 17px Arial,sans-serif;fill:#5e7288} .badge{font:700 20px Arial,sans-serif;fill:#071a33}
    .panelTitle{font:700 22px Arial,sans-serif;fill:#071a33} .bubble{font:600 19px Arial,sans-serif;fill:#18324d}
  </style>
</defs>
<rect width="1600" height="900" fill="#f4f7fb"/>
<rect x="0" y="0" width="1600" height="145" fill="url(#header)"/><rect x="0" y="137" width="1600" height="8" fill="url(#gold)"/><text x="70" y="68" class="title">VHF Routine Communication Flow</text><text x="72" y="108" class="subtitle">AMCOL Maritime English • Unit 2 Visual Guide</text><rect x="70" y="190" width="346" height="286" rx="26" fill="#fff" stroke="#d9e3ed" filter="url(#shadow)"/><rect x="70" y="190" width="10" height="286" rx="5" fill="#174a82"/><circle cx="128" cy="248" r="30" fill="#174a82" opacity=".13"/><circle cx="128" cy="248" r="18" fill="#174a82"/><text x="170" y="242" class="cardTitle">1</text><text x="106" y="300" class="body"><tspan x="106" dy="0">Call the station</tspan></text><text x="106" y="448" class="small">Clear • Short • Operational</text><rect x="442" y="190" width="346" height="286" rx="26" fill="#fff" stroke="#d9e3ed" filter="url(#shadow)"/><rect x="442" y="190" width="10" height="286" rx="5" fill="#d8aa3d"/><circle cx="500" cy="248" r="30" fill="#d8aa3d" opacity=".13"/><circle cx="500" cy="248" r="18" fill="#d8aa3d"/><text x="542" y="242" class="cardTitle">2</text><text x="477" y="300" class="body"><tspan x="477" dy="0">Identify own vessel</tspan></text><text x="478" y="448" class="small">Clear • Short • Operational</text><rect x="813" y="190" width="346" height="286" rx="26" fill="#fff" stroke="#d9e3ed" filter="url(#shadow)"/><rect x="813" y="190" width="10" height="286" rx="5" fill="#2f8b68"/><circle cx="871" cy="248" r="30" fill="#2f8b68" opacity=".13"/><circle cx="871" cy="248" r="18" fill="#2f8b68"/><text x="913" y="242" class="cardTitle">3</text><text x="849" y="300" class="body"><tspan x="849" dy="0">Move to working channel</tspan></text><text x="849" y="448" class="small">Clear • Short • Operational</text><rect x="1184" y="190" width="346" height="286" rx="26" fill="#fff" stroke="#d9e3ed" filter="url(#shadow)"/><rect x="1184" y="190" width="10" height="286" rx="5" fill="#2774b8"/><circle cx="1242" cy="248" r="30" fill="#2774b8" opacity=".13"/><circle cx="1242" cy="248" r="18" fill="#2774b8"/><text x="1284" y="242" class="cardTitle">4</text><text x="1220" y="300" class="body"><tspan x="1220" dy="0">Use the correct marker</tspan></text><text x="1220" y="448" class="small">Clear • Short • Operational</text><rect x="70" y="504" width="346" height="286" rx="26" fill="#fff" stroke="#d9e3ed" filter="url(#shadow)"/><rect x="70" y="504" width="10" height="286" rx="5" fill="#d7881f"/><circle cx="128" cy="562" r="30" fill="#d7881f" opacity=".13"/><circle cx="128" cy="562" r="18" fill="#d7881f"/><text x="170" y="556" class="cardTitle">5</text><text x="106" y="614" class="body"><tspan x="106" dy="0">Give exact information</tspan></text><text x="106" y="762" class="small">Clear • Short • Operational</text><rect x="442" y="504" width="346" height="286" rx="26" fill="#fff" stroke="#d9e3ed" filter="url(#shadow)"/><rect x="442" y="504" width="10" height="286" rx="5" fill="#6e5fb8"/><circle cx="500" cy="562" r="30" fill="#6e5fb8" opacity=".13"/><circle cx="500" cy="562" r="18" fill="#6e5fb8"/><text x="542" y="556" class="cardTitle">6</text><text x="477" y="614" class="body"><tspan x="477" dy="0">Confirm or answer</tspan></text><text x="478" y="762" class="small">Clear • Short • Operational</text><rect x="813" y="504" width="346" height="286" rx="26" fill="#fff" stroke="#d9e3ed" filter="url(#shadow)"/><rect x="813" y="504" width="10" height="286" rx="5" fill="#3c8f9d"/><circle cx="871" cy="562" r="30" fill="#3c8f9d" opacity=".13"/><circle cx="871" cy="562" r="18" fill="#3c8f9d"/><text x="913" y="556" class="cardTitle">7</text><text x="849" y="614" class="body"><tspan x="849" dy="0">Close with Over or Out</tspan></text><text x="849" y="762" class="small">Clear • Short • Operational</text><rect x="70" y="826" width="1460" height="1" fill="#d9e3ed"/><text x="70" y="863" class="small">Use this visual before reading the detailed discussion, then return to it during practice.</text>
</svg>